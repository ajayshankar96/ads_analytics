apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustscan-ingress
  namespace: analytics-tools
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - trustscan.internal.razorpay.com  # Update with your internal domain
    secretName: trustscan-tls
  rules:
  - host: trustscan.internal.razorpay.com  # Update with your internal domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trustscan-frontend
            port:
              number: 80
